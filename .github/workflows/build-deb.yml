name: Build Debian Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read package metadata
        id: meta
        run: |
          echo "pkg=$(grep '^Package:' debian/control | awk '{print $2}')" >> $GITHUB_OUTPUT
          echo "ver=$(grep '^Version:' debian/control | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Build .deb package
        run: |
          PKG="${{ steps.meta.outputs.pkg }}"
          VER="${{ steps.meta.outputs.ver }}"
          BUILD="build/${PKG}_${VER}"

          mkdir -p "${BUILD}/DEBIAN"
          mkdir -p "${BUILD}/usr/lib/python3/dist-packages"

          cp cloud_hetzner.py "${BUILD}/usr/lib/python3/dist-packages/cloud_hetzner.py"

          cp debian/control "${BUILD}/DEBIAN/control"
          sudo chown -R root:root "${BUILD}"
          dpkg-deb --build "${BUILD}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: build/*.deb
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.deb
